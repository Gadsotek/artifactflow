expose_php=Off
; Never render PHP-level errors into the HTTP response, even for failures that
; occur before Laravel's exception handler is registered (bootstrap/parse/extension
; load). APP_DEBUG governs Laravel's handler, not the PHP display_errors ini.
display_errors=Off
log_errors=On
memory_limit=512M
upload_max_filesize=20M
post_max_size=25M
max_execution_time=60
