<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 940" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial,sans-serif">
  <style>
    .bg{fill:#ffffff}
    .title{font-size:26px;font-weight:700;fill:#0f172a}
    .subtitle{font-size:13px;fill:#64748b}
    .band{rx:14;stroke-width:1.5}
    .bandlabel{font-size:15px;font-weight:700}
    .box{rx:8;fill:#ffffff;stroke-width:1.2}
    .h{font-size:12.5px;font-weight:700;fill:#0f172a}
    .t{font-size:11px;fill:#334155}
    .mono{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;fill:#334155}
    .note{font-size:10.5px;font-style:italic;fill:#64748b}
    .legend{font-size:11px;fill:#475569}
    .arrow{stroke:#94a3b8;stroke-width:1.6;fill:none;marker-end:url(#a)}
  </style>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8z" fill="#94a3b8"/></marker>
  </defs>
  <rect class="bg" width="1340" height="940"/>
  <text class="title" x="28" y="40">ArtifactFlow — Architecture Map</text>
  <text class="subtitle" x="28" y="60">Laravel 13 · PHP 8.5 strict · PostgreSQL · modular layering · FrankenPHP two-origin runtime · “where what lives”</text>
  <line x1="28" y1="74" x2="1312" y2="74" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- LEFT: layered architecture -->
  <!-- HTTP -->
  <rect class="band" x="28" y="92" width="920" height="156" fill="#eff6ff" stroke="#bfdbfe"/>
  <text class="bandlabel" x="44" y="116" fill="#2563eb">1 · HTTP / Delivery</text>
  <text class="note" x="180" y="116" fill="#2563eb">app/Http · routes/ — thin: parse → authorize → delegate → respond</text>
  <rect class="box" x="44" y="128" width="210" height="104" stroke="#93c5fd"/>
  <text class="h" x="56" y="148">Routing</text>
  <text class="mono" x="56" y="168">routes/web.php</text>
  <text class="mono" x="56" y="184">routes/console.php</text>
  <text class="mono" x="56" y="200">routes/channels.php</text>
  <text class="note" x="56" y="220">(console: schedule · channels: presence)</text>
  <rect class="box" x="266" y="128" width="320" height="104" stroke="#93c5fd"/>
  <text class="h" x="278" y="148">Middleware pipeline</text>
  <text class="t" x="278" y="167">EnforceRuntimeRoleSurface (app vs artifact-host)</text>
  <text class="t" x="278" y="183">Reject/RequireArtifactHostRuntime · ThrottleMcpRequests</text>
  <text class="t" x="278" y="199">AddSecurityHeaders (nonce-CSP, HSTS, XFO)</text>
  <text class="t" x="278" y="215">EnforceTwoFactorEnrollment · step-up confirmation ×2</text>
  <rect class="box" x="598" y="128" width="166" height="104" stroke="#93c5fd"/>
  <text class="h" x="610" y="148">Controllers ×25</text>
  <text class="t" x="610" y="167">Page · Version · Lifecycle</text>
  <text class="t" x="610" y="183">AccessGrant · Workspace</text>
  <text class="t" x="610" y="199">Mcp · ArtifactPreview</text>
  <text class="t" x="610" y="215">2FA · TrustedDevice…</text>
  <rect class="box" x="776" y="128" width="160" height="104" stroke="#93c5fd"/>
  <text class="h" x="788" y="148">FormRequests</text>
  <text class="t" x="788" y="167">validation +</text>
  <text class="t" x="788" y="183">authorize() +</text>
  <text class="t" x="788" y="199">installation limits</text>

  <!-- APPLICATION -->
  <rect class="band" x="28" y="262" width="920" height="316" fill="#eef2ff" stroke="#c7d2fe"/>
  <text class="bandlabel" x="44" y="286" fill="#4f46e5">2 · Application (use-cases)</text>
  <text class="note" x="300" y="286" fill="#4f46e5">app/Application — command → handler, DTOs, read-models, all rules live here</text>
  <!-- Identity -->
  <rect class="box" x="44" y="298" width="212" height="170" stroke="#a5b4fc"/>
  <text class="h" x="56" y="318">Identity</text>
  <text class="t" x="56" y="337">Users · workspaces · roles</text>
  <text class="t" x="56" y="353">Invitations (accept = email-</text>
  <text class="t" x="56" y="369">bound, no bearer links)</text>
  <text class="t" x="56" y="385">Membership removal audit</text>
  <text class="t" x="56" y="401">TOTP 2FA · recovery codes</text>
  <text class="t" x="56" y="417">TrustedDeviceManager</text>
  <text class="t" x="56" y="433">Password reset · theme</text>
  <text class="note" x="56" y="455">+ *Overview / *Item read-models</text>
  <!-- PageCatalog -->
  <rect class="box" x="266" y="298" width="300" height="170" stroke="#a5b4fc"/>
  <text class="h" x="278" y="318">PageCatalog ★ (core)</text>
  <text class="t" x="278" y="337">CreatePage · UpdatePageContent/Metadata</text>
  <text class="t" x="278" y="353">PageVersionAppender · Restore/RevertVersion</text>
  <text class="t" x="278" y="369">MovePageToWorkspace · Grant/RevokeAccess</text>
  <text class="t" x="278" y="385">PageStatusChanger (archive/approve/deprecate)</text>
  <text class="t" x="278" y="401">PageSearch · MarkdownPageRenderer · WikiLink</text>
  <text class="t" x="278" y="417">PageContentScanner · SecurityWarningRecorder</text>
  <text class="t" x="278" y="433">ArtifactPreviewUrl · ArtifactContentReader/Deleter</text>
  <text class="t" x="278" y="449">PageAccess · PageFinder · PageDetailViewData</text>
  <!-- Mcp -->
  <rect class="box" x="576" y="298" width="184" height="170" stroke="#a5b4fc"/>
  <text class="h" x="588" y="318">Mcp</text>
  <text class="t" x="588" y="337">Token issue/revoke</text>
  <text class="t" x="588" y="353">(2FA-gated, SHA-256 at</text>
  <text class="t" x="588" y="369">rest, expiry, scopes +</text>
  <text class="t" x="588" y="385">workspace binding)</text>
  <text class="t" x="588" y="401">EffectiveAuthority</text>
  <text class="t" x="588" y="417">(Admin → Editor ceiling)</text>
  <text class="t" x="588" y="433">DataEnvelope (untrusted)</text>
  <text class="t" x="588" y="449">JsonRpc · ToolCatalog ×6</text>
  <!-- Administration / Audit / Diagnostics -->
  <rect class="box" x="770" y="298" width="166" height="170" stroke="#a5b4fc"/>
  <text class="h" x="782" y="318">Administration</text>
  <text class="t" x="782" y="337">Installation limits</text>
  <text class="t" x="782" y="353">+ usage overview</text>
  <text class="h" x="782" y="380">Audit</text>
  <text class="t" x="782" y="399">AuditLogger →</text>
  <text class="t" x="782" y="415">audit_entries</text>
  <text class="h" x="782" y="442">Diagnostics</text>
  <text class="t" x="782" y="461">Doctor · Installer</text>
  <!-- cross-cutting strip -->
  <rect class="box" x="44" y="480" width="430" height="86" stroke="#a5b4fc" fill="#f5f3ff"/>
  <text class="h" x="56" y="500">Events — transactional outbox</text>
  <text class="t" x="56" y="519">DomainEventRecorder → domain_events (IN the same DB tx)</text>
  <text class="t" x="56" y="535">DispatchDomainEvents (scheduler, every min, lockForUpdate)</text>
  <text class="t" x="56" y="551">failure quarantine + requeue-by-uid · after-commit listeners</text>
  <rect class="box" x="484" y="480" width="452" height="86" stroke="#a5b4fc" fill="#f5f3ff"/>
  <text class="h" x="496" y="500">PageAccess — single source of authorization</text>
  <text class="t" x="496" y="519">PagePolicy (Gate) and MCP handlers both delegate here — one code path</text>
  <text class="t" x="496" y="535">canView · canEdit · administer · MCP workspace ceiling enforced inside</text>
  <text class="t" x="496" y="551">grant rules: workspace-subject lowered · memoized per request + authority</text>

  <!-- DOMAIN -->
  <rect class="band" x="28" y="592" width="920" height="92" fill="#f0fdfa" stroke="#99f6e4"/>
  <text class="bandlabel" x="44" y="616" fill="#0d9488">3 · Domain</text>
  <text class="note" x="150" y="616" fill="#0d9488">app/Domain — backed enums + exceptions (deliberately small: behaviour lives in Application)</text>
  <rect class="box" x="44" y="628" width="300" height="44" stroke="#5eead4"/>
  <text class="h" x="56" y="646">Identity enums</text>
  <text class="t" x="56" y="664">WorkspaceRole · WorkspaceType · ThemePreference</text>
  <rect class="box" x="354" y="628" width="380" height="44" stroke="#5eead4"/>
  <text class="h" x="366" y="646">PageCatalog enums</text>
  <text class="t" x="366" y="664">PageStatus · PageType · PageAccessMode · SubjectType · VersionSource</text>
  <rect class="box" x="744" y="628" width="192" height="44" stroke="#5eead4"/>
  <text class="h" x="756" y="646">Exceptions</text>
  <text class="t" x="756" y="664">StaleVersion · BlockedContent…</text>

  <!-- PERSISTENCE -->
  <rect class="band" x="28" y="698" width="920" height="142" fill="#fffbeb" stroke="#fde68a"/>
  <text class="bandlabel" x="44" y="722" fill="#d97706">4 · Persistence</text>
  <rect class="box" x="44" y="734" width="208" height="92" stroke="#fcd34d"/>
  <text class="h" x="56" y="754">Models (Eloquent) ×15</text>
  <text class="t" x="56" y="772">ULID PKs (uid)</text>
  <text class="t" x="56" y="788">$fillable-guarded +</text>
  <text class="t" x="56" y="804">preventSilentlyDiscarding</text>
  <text class="t" x="56" y="820">forceFill for privileged</text>
  <rect class="box" x="262" y="734" width="430" height="92" stroke="#fcd34d"/>
  <text class="h" x="274" y="754">PostgreSQL</text>
  <text class="mono" x="274" y="772">pages · page_versions (+ search_vector GIN)</text>
  <text class="mono" x="274" y="788">workspaces · _memberships · _invitations · _removals</text>
  <text class="mono" x="274" y="804">page_access_grants · categories · tags · trusted_devices</text>
  <text class="mono" x="274" y="820">mcp_access_tokens · domain_events · audit_entries · install…</text>
  <rect class="box" x="702" y="734" width="234" height="92" stroke="#fcd34d"/>
  <text class="h" x="714" y="754">Artifacts disk (filesystem)</text>
  <text class="mono" x="714" y="774">pages/{pageUid}/</text>
  <text class="mono" x="714" y="790">  versions/{n}-{versionUid}/{file}.{ext}</text>
  <text class="note" x="714" y="810">untrusted bytes; served only</text>
  <text class="note" x="714" y="824">on the artifact-host origin</text>

  <!-- cross-cutting infra/security band (full width bottom) -->
  <rect class="band" x="28" y="856" width="1284" height="68" fill="#fff1f2" stroke="#fecdd3"/>
  <text class="bandlabel" x="44" y="880" fill="#e11d48">Cross-cutting · Infrastructure / Security &amp; boot</text>
  <text class="t" x="44" y="902">Infrastructure/Security/ProductionSecurityConfiguration — fail-closed prod boot (origins, keys, CSP, sessions, proxies, debug)</text>
  <text class="t" x="44" y="918">Providers/AppServiceProvider — strict mass-assign · named rate limiters ×12 · scoped MCP context · Event::listen</text>
  <text class="t" x="820" y="902">config/* (pages, rate_limits, app, session, broadcasting)</text>
  <text class="t" x="820" y="918">CI gates: PHPStan max · ECS · 100% types · coverage floor · e2e · Trivy</text>

  <!-- RIGHT: where it lives -->
  <rect class="band" x="964" y="92" width="348" height="592" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="bandlabel" x="982" y="116" fill="#334155">Where it lives</text>
  <text class="mono" x="982" y="142">app/</text>
  <text class="mono" x="982" y="160">├─ Http/          1 · delivery</text>
  <text class="mono" x="982" y="178">│  ├─ Controllers/  Middleware/</text>
  <text class="mono" x="982" y="196">│  └─ Requests/   (validation)</text>
  <text class="mono" x="982" y="214">├─ Application/    2 · use-cases</text>
  <text class="mono" x="982" y="232">│  ├─ Identity/   ├─ Mcp/</text>
  <text class="mono" x="982" y="250">│  ├─ PageCatalog/  ★ core</text>
  <text class="mono" x="982" y="268">│  ├─ Administration/ Diagnostics/</text>
  <text class="mono" x="982" y="286">│  ├─ Events/   └─ Audit/</text>
  <text class="mono" x="982" y="304">├─ Domain/         3 · enums+exc</text>
  <text class="mono" x="982" y="322">├─ Models/         4 · Eloquent</text>
  <text class="mono" x="982" y="340">├─ Policies/       Gate → PageAccess</text>
  <text class="mono" x="982" y="358">├─ Console/Commands/  ×19 artisan</text>
  <text class="mono" x="982" y="376">├─ Infrastructure/Security/</text>
  <text class="mono" x="982" y="394">└─ Providers/      boot wiring</text>
  <text class="mono" x="982" y="420">routes/   web · console · channels</text>
  <text class="mono" x="982" y="438">config/   pages,rate_limits,app…</text>
  <text class="mono" x="982" y="456">database/ migrations · factories</text>
  <text class="mono" x="982" y="474">resources/ views (Blade) · js (CM/Mermaid)</text>
  <text class="mono" x="982" y="492">docker/   Caddyfile · start-*.sh</text>
  <text class="mono" x="982" y="510">tests/    Feature · e2e (Playwright)</text>
  <text class="mono" x="982" y="528">docs/ · THREAT-MODEL.md · SECURITY.md</text>

  <text class="bandlabel" x="982" y="566" fill="#334155" font-size="13">Legend</text>
  <rect x="982" y="578" width="14" height="14" rx="3" fill="#eff6ff" stroke="#2563eb"/><text class="legend" x="1004" y="589">HTTP / delivery (thin)</text>
  <rect x="982" y="600" width="14" height="14" rx="3" fill="#eef2ff" stroke="#4f46e5"/><text class="legend" x="1004" y="611">Application — the logic</text>
  <rect x="982" y="622" width="14" height="14" rx="3" fill="#f0fdfa" stroke="#0d9488"/><text class="legend" x="1004" y="633">Domain — enums/exceptions</text>
  <rect x="982" y="644" width="14" height="14" rx="3" fill="#fffbeb" stroke="#d97706"/><text class="legend" x="1004" y="655">Persistence — DB + disk</text>
  <rect x="982" y="666" width="14" height="14" rx="3" fill="#fff1f2" stroke="#e11d48"/><text class="legend" x="1004" y="677">Security / cross-cutting</text>
  <text class="note" x="982" y="700">★ = where most of the work is</text>

  <!-- flow arrows down the left stack -->
  <path class="arrow" d="M488 248 L488 262"/>
  <path class="arrow" d="M488 578 L488 592"/>
  <path class="arrow" d="M488 684 L488 698"/>
</svg>
