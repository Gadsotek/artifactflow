name: CLA

# CLA Assistant Lite. Uses pull_request_target deliberately and safely: this
# workflow never checks out or executes pull-request code; the action only
# reads PR metadata/comments and records signatures on the cla-signatures
# branch of this repository. Do not add a checkout step of the PR head here.
on:
  issue_comment:
    types:
      - created
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions: {}

jobs:
  cla:
    if: |
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       (contains(github.event.comment.body, 'I have read the CLA Document and I hereby sign the CLA') ||
        github.event.comment.body == 'recheck'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: write
      pull-requests: write
      statuses: write
    steps:
      - name: CLA Assistant Lite
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/Gadsotek/artifactflow/blob/main/CLA.md
          branch: cla-signatures
          allowlist: Gadsotek,dependabot[bot],dependabot-preview[bot]
          custom-notsigned-prcomment: >
            Thank you for the contribution. Before it can be reviewed and merged,
            please read the [Contributor License Agreement](https://github.com/Gadsotek/artifactflow/blob/main/CLA.md)
            and sign it by posting the comment below. Signing is required once and
            covers all your contributions to this project; it is a license grant —
            you keep the copyright to your work.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA.'
          lock-pullrequest-aftermerge: false
